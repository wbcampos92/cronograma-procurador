  16:{theme:"Simulado Completo I",constitucional:{lei:"Releitura das anotações e flashcards",questoes:"Simulado completo 1 — 120 questões",revisao:"Correção e análise por matéria"},administrativo:{lei:"Releitura das anotações e flashcards",questoes:"Simulado completo 1 — 120 questões",revisao:"Identificar as 3 matérias com mais erros"},processo:{lei:"Releitura das anotações e flashcards",questoes:"Simulado completo 1 — 120 questões",revisao:"Plano de ataque aos pontos fracos"},tributario:{lei:"Releitura das anotações e flashcards",questoes:"Simulado completo 1 — 120 questões",revisao:"Fichas de revisão rápida"},financeiro:{lei:"Releitura das anotações e flashcards",questoes:"Simulado completo 1 — 120 questões",revisao:"Fichas de revisão rápida"}},
  17:{theme:"Reforço por Matéria",constitucional:{lei:"Reestudo dos temas errados no simulado 1",questoes:"30 questões focadas nos erros",revisao:"Atualização das fichas de revisão"},administrativo:{lei:"Reestudo dos temas errados no simulado 1",questoes:"30 questões focadas nos erros",revisao:"Atualização das fichas de revisão"},processo:{lei:"Reestudo dos temas errados no simulado 1",questoes:"25 questões focadas nos erros",revisao:"Atualização das fichas de revisão"},tributario:{lei:"Reestudo dos temas errados no simulado 1",questoes:"25 questões focadas nos erros",revisao:"Atualização das fichas de revisão"},financeiro:{lei:"Reestudo dos temas errados no simulado 1",questoes:"20 questões focadas nos erros",revisao:"Atualização das fichas de revisão"}},
  18:{theme:"Simulado Completo II",constitucional:{lei:"Revisão rápida: CF, Lei 9.784/99, CTN, CPC",questoes:"Simulado completo 2 — 120 questões cronometrado",revisao:"Comparativo: Simulado 1 x 2"},administrativo:{lei:"Revisão rápida: Lei 8.429/92, 8.112/90, 14.133/21",questoes:"Simulado completo 2 — 120 questões cronometrado",revisao:"Identificar evolução e pontos críticos"},processo:{lei:"Revisão rápida: títulos, recursos, tutelas",questoes:"Simulado completo 2 — 120 questões cronometrado",revisao:"Refinar gestão do tempo"},tributario:{lei:"Revisão rápida: CTN, LC 116/2003, execução fiscal",questoes:"Simulado completo 2 — 120 questões cronometrado",revisao:"Revisão dos erros recorrentes"},financeiro:{lei:"Revisão rápida: LRF, Lei 4.320/64, orçamento",questoes:"Simulado completo 2 — 120 questões cronometrado",revisao:"Revisão dos erros recorrentes"}},

  20:{theme:"Véspera de Prova",constitucional:{lei:"Leitura leve das fichas — sem novas informações",questoes:"10 questões de aquecimento (fáceis)",revisao:"Descanso mental, revisão de estratégia"},administrativo:{lei:"Leitura leve das fichas — sem novas informações",questoes:"10 questões de aquecimento (fáceis)",revisao:"Descanso mental, revisão de estratégia"},processo:{lei:"Leitura leve das fichas — sem novas informações",questoes:"10 questões de aquecimento (fáceis)",revisao:"Descanso mental, revisão de estratégia"},tributario:{lei:"Leitura leve das fichas — sem novas informações",questoes:"10 questões de aquecimento (fáceis)",revisao:"Descanso mental, revisão de estratégia"},financeiro:{lei:"Leitura leve das fichas — sem novas informações",questoes:"10 questões de aquecimento (fáceis)",revisao:"Descanso mental, revisão de estratégia"}},
};

// ── STATE ──────────────────────────────────────────────────────────
let currentWeek=1;
let expandedSubject=null;
let prog={};
try{const s=localStorage.getItem("proc_v3");if(s)prog=JSON.parse(s);}catch(_){}

function mk(w,s,a){return `w${w}_${s}_${a}`;}
function save(){try{localStorage.setItem("proc_v3",JSON.stringify(prog));}catch(_){}}
function wProg(w){let d=0;for(const s of Object.keys(subjects))for(const a of ACT)if(prog[mk(w,s,a)])d++;return d;}
function totalDone(){return Object.values(prog).filter(Boolean).length;}

// ── GLOBAL PROGRESS ─────────────────────────────────────────────────
function updateGlobal(){
  const done=totalDone(),total=300,pct=Math.round((done/total)*100);
  document.getElementById("gPct").textContent=pct+"%";
  document.getElementById("gPct").style.color=pct===100?"#6FCF97":"#C8973A";
  document.getElementById("gBar").style.width=pct+"%";
  document.getElementById("gText").textContent=`${done} de ${total} atividades concluídas`;
}

// ── TABS ─────────────────────────────────────────────────────────────
function switchTab(id,btn){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  ["semana","fases","rotina"].forEach(t=>{
    document.getElementById("tab-"+t).style.display=t===id?"block":"none";
  });
  if(id==="semana")renderSemana();
  if(id==="fases")renderFases();
  if(id==="rotina")renderRotina();
}

// ── SEMANA TAB ───────────────────────────────────────────────────────
function renderSemana(){
  const wd=WD[currentWeek];
  const phase=phases.find(p=>p.weeks.includes(currentWeek));
  const done=wProg(currentWeek),total=15,pct=Math.round((done/total)*100);

  let html=``;

  // phase badge
  if(phase) html+=`<div class="phase-badge" style="border:1px solid ${phase.color}33">
    <div class="phase-dot" style="background:${phase.color}"></div>
    <span class="phase-label" style="color:${phase.color}">${phase.label} — ${phase.name}</span>
  </div>`;

  // week grid
  html+=`<div class="week-grid">`;
  for(let w=1;w<=20;w++){
    const ph=phases.find(p=>p.weeks.includes(w));
    const d=wProg(w),isDone=d===15,isActive=w===currentWeek;
    const pBar=Math.round((d/15)*100);
    let cls="week-btn"+(isActive?" active":"")+(isDone?" done":"");
    let style=`border:${isActive?`2px solid ${ph?.color||"#C8973A"}`:`1px solid ${isDone?"#6FCF9944":"#2A3140"}`};`;
    style+=`background:${isActive?`${ph?.color}22`:isDone?"#0d1a0d":"#13192A"};`;
    style+=`color:${isActive?ph?.color||"#C8973A":isDone?"#6FCF97":"#8892A4"};`;
    html+=`<button class="${cls}" style="${style}" onclick="selectWeek(${w})">
      <span>${isDone?"✓":w}</span>
      <div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:${pBar}%;background:${isDone?"#6FCF97":ph?.color||"#C8973A"}"></div></div>
    </button>`;
  }
  html+=`</div>`;

  // week title
  html+=`<div class="week-header">
    <div class="week-title">Sem. ${currentWeek} — <span style="color:${phase?.color||"#C8973A"}">${wd?.theme}</span></div>
    <div class="week-count">${done}/15</div>
  </div>`;

  // subject cards
  for(const [key,subj] of Object.entries(subjects)){
    const data=wd?.[key];
    const subjDone=ACT.filter(a=>prog[mk(currentWeek,key,a)]).length;
    const allDone=subjDone===3;
    const isExp=expandedSubject===key;

    html+=`<div class="subject-card${allDone?" all-done":""}" id="card-${key}">
      <button class="subject-header" onclick="toggleSubject('${key}')">
        <div class="subject-icon" style="background:${allDone?"#6FCF9722":subj.color+"22"};${allDone?"border:1.5px solid #6FCF97":""}">
          ${allDone?"✅":subj.icon}
        </div>
        <div style="flex:1;min-width:0">
          <div class="subject-name${allDone?" done":""}">${subj.label}</div>
          ${!isExp&&data?`<div class="subject-preview">${data.lei}</div>`:""}
        </div>
        <div class="dots">
          ${actMeta.map(m=>{const c=!!prog[mk(currentWeek,key,m.key)];return`<div class="dot" style="${c?`background:${m.color};border-color:${m.color}`:""}"></div>`;}).join("")}
        </div>
        <div class="chevron" style="color:${subj.color}">${isExp?"▲":"▼"}</div>
      </button>`;

    if(isExp&&data){
      html+=`<div class="activities">`;
      for(const item of actMeta){
        const checked=!!prog[mk(currentWeek,key,item.key)];
        html+=`<div class="activity" style="background:${checked?"#0a160a":item.bg};border:1px solid ${checked?"#6FCF9744":item.border}">
          <div class="activity-inner">
            <div class="activity-body">
              <div class="activity-label" style="color:${checked?"#6FCF97":item.color}">${item.icon} ${item.label}</div>
              <div class="activity-text${checked?" checked":""}">${data[item.key]}</div>
            </div>
            <button class="check-btn${checked?" checked":""}" onclick="toggleItem(${currentWeek},'${key}','${item.key}')">✓</button>
          </div>
        </div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  }

  document.getElementById("tab-semana").innerHTML=html;
}

function selectWeek(w){
  currentWeek=w;
  expandedSubject=null;
  renderSemana();
}

function toggleSubject(key){
  expandedSubject=expandedSubject===key?null:key;
  renderSemana();
}

function toggleItem(w,s,a){
  const k=mk(w,s,a);
  prog[k]=!prog[k];
  save();
  updateGlobal();
  renderSemana();
  // also refresh fases if visible
  if(document.getElementById("tab-fases").style.display!=="none")renderFases();
}

// ── FASES TAB ────────────────────────────────────────────────────────
function renderFases(){
  let html=`<div style="font-size:15px;font-weight:bold;color:#F0E8D8;margin-bottom:4px">Visão Geral das 4 Fases</div>
  <div style="font-size:12px;color:#6B7280;margin-bottom:14px">Clique em uma semana para navegar.</div>`;

  for(const ph of phases){
    const phItems=ph.weeks.length*15;
    const phDone=ph.weeks.reduce((a,w)=>a+wProg(w),0);
    const phPct=Math.round((phDone/phItems)*100);
    html+=`<div class="phase-card" style="border:1px solid ${ph.color}44;background:#13192A">
      <div class="phase-header" style="border-bottom:1px solid ${ph.color}22">
        <div class="phase-title-row">
          <div class="phase-icon" style="background:${ph.color}22;color:${ph.color}">F${ph.id}</div>
          <div>
            <div style="font-size:14px;font-weight:bold;color:${ph.color}">${ph.label} — ${ph.name}</div>
            <div style="font-size:11px;color:#8892A4">Semanas ${ph.weeks[0]}–${ph.weeks[ph.weeks.length-1]}</div>
          </div>
        </div>
        <div class="phase-prog-row">
          <div class="phase-prog-bar"><div class="phase-prog-fill" style="width:${phPct}%;background:${phPct===100?"#6FCF97":ph.color}"></div></div>
          <span class="phase-prog-text">${phDone}/${phItems} · ${phPct}%</span>
        </div>
      </div>
      <div class="week-chips">
        ${ph.weeks.map(w=>{
          const d=wProg(w),c=d===15;
          return`<button class="week-chip" onclick="goWeek(${w})" style="background:${c?"#0d1a0d":ph.color+"11"};border:1px solid ${c?"#6FCF9744":ph.color+"44"};color:${c?"#6FCF97":ph.color}">${c?"✓ ":""}S${w} — ${WD[w]?.theme}</button>`;
        }).join("")}
      </div>
    </div>`;
  }

  // weight bars
  const weights={constitucional:90,administrativo:85,processo:75,tributario:80,financeiro:65};
  html+=`<div class="info-box"><div class="info-title">🎯 Pesos Estimados — FAFIPA</div>`;
  for(const [k,s] of Object.entries(subjects)){
    html+=`<div class="weight-row">
      <div style="width:120px;font-size:12px;color:#C8C0B0">${s.label}</div>
      <div class="weight-bar-wrap" style="flex:1"><div class="weight-bar-fill" style="width:${weights[k]}%;background:${s.color}"></div></div>
      <div style="font-size:11px;color:#6B7280;width:30px">${weights[k]}%</div>
    </div>`;
  }
  html+=`<div style="font-size:10px;color:#4B5563;margin-top:8px">* Estimativa baseada em editais anteriores da FAFIPA.</div></div>`;

  document.getElementById("tab-fases").innerHTML=html;
}

function goWeek(w){
  currentWeek=w;
  expandedSubject=null;
  document.querySelectorAll(".tab-btn").forEach((b,i)=>{b.classList.toggle("active",i===0);});
  document.getElementById("tab-semana").style.display="block";
  document.getElementById("tab-fases").style.display="none";
  document.getElementById("tab-rotina").style.display="none";
  renderSemana();
}

// ── ROTINA TAB ───────────────────────────────────────────────────────
function renderRotina(){
  const days=[
    {day:"Segunda",subj:"constitucional",hrs:"06h–08h / 19h–21h"},
    {day:"Terça",subj:"administrativo",hrs:"06h–08h / 19h–21h"},
    {day:"Quarta",subj:"processo",hrs:"06h–08h / 19h–21h"},
    {day:"Quinta",subj:"tributario",hrs:"06h–08h / 19h–21h"},
    {day:"Sexta",subj:"financeiro",hrs:"06h–08h / 19h–21h"},
    {day:"Sábado",subj:null,hrs:"Descanso"},
    {day:"Domingo",subj:null,hrs:"08h–12h"},
  ];
  let html=`<div style="font-size:15px;font-weight:bold;color:#F0E8D8;margin-bottom:4px">Rotina Semanal</div>
  <div style="font-size:12px;color:#6B7280;margin-bottom:14px">3h por dia · lei, questões e revisão de erros.</div>`;

  for(const {day,subj,hrs} of days){
    const s=subj?subjects[subj]:null;
    const isSab=day==="Sábado",isDom=day==="Domingo";
    html+=`<div class="day-row" style="background:${isSab?"#0D1117":"#13192A"};border:1px solid ${isSab?"#2A3140":s?s.color+"44":"#3A4A60"};opacity:${isSab?0.45:1}">
      <div class="day-label" style="color:${isSab?"#4B5563":"#F0E8D8"}">${day}</div>
      <div class="day-bar" style="background:${s?s.color:isDom?"#C8973A":"#2A3140"}"></div>
      <div style="flex:1">`;
    if(s){html+=`<div style="font-size:13px;font-weight:bold;color:${s.color}">${s.label}</div>
        <div style="font-size:10px;color:#8892A4;margin-top:2px">📖 Lei · ✏️ Questões · 🔁 Revisão</div>`;}
    else if(isDom){html+=`<div style="font-size:13px;font-weight:bold;color:#C8973A">Revisão Geral + Simulado</div>
        <div style="font-size:10px;color:#8892A4;margin-top:2px">🔁 Revisão · ✏️ Simulado · 📊 Análise</div>`;}
    else{html+=`<div style="font-size:13px;color:#4B5563">Descanso 😴</div>`;}
    html+=`</div><div style="font-size:10px;color:#6B7280">${hrs}</div></div>`;
  }

  html+=`<div class="info-box"><div class="info-title">💡 Como estudar cada bloco</div>
  ${[
    {icon:"📖",t:"Leitura da Lei (1h)",d:"Leia com marcações. Para cada artigo: O que regula? Qual a consequência? Existe exceção?"},
    {icon:"✏️",t:"Questões (1h30)",d:"Resolva questões FAFIPA. Leia sempre o gabarito comentado — inclusive nas certas."},
    {icon:"🔁",t:"Revisão de Erros (30min)",d:"Anote cada erro: tema, motivo (distração/desconhecimento/pegadinha) e a regra correta."},
  ].map(item=>`<div class="method-item">
    <div class="method-icon">${item.icon}</div>
    <div><div class="method-title">${item.t}</div><div class="method-desc">${item.d}</div></div>
  </div>`).join("")}</div>`;

  document.getElementById("tab-rotina").innerHTML=html;
}

// ── INIT ─────────────────────────────────────────────────────────────
updateGlobal();
renderSemana();
</script>
